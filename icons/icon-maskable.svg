<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#faf3e3"/>
      <stop offset="60%" stop-color="#f3ece0"/>
      <stop offset="100%" stop-color="#e8dcc1"/>
    </radialGradient>
    <linearGradient id="ink" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3a2f24"/>
      <stop offset="100%" stop-color="#2b251e"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d4b079"/>
      <stop offset="100%" stop-color="#b08642"/>
    </linearGradient>
  </defs>

  <!-- Full background (will be cropped to any shape) -->
  <rect width="512" height="512" fill="url(#bg)"/>

  <!-- Halos sized down to safe zone (~40% radius) -->
  <circle cx="256" cy="256" r="140" fill="none" stroke="url(#gold)" stroke-width="2" opacity="0.35"/>
  <circle cx="256" cy="256" r="120" fill="none" stroke="url(#gold)" stroke-width="1" opacity="0.2"/>

  <!-- Smaller "能" within safe zone -->
  <text x="256" y="320"
        text-anchor="middle"
        font-family="'Noto Serif TC', 'Songti TC', 'PingFang TC', 'Hiragino Mincho ProN', serif"
        font-size="240"
        font-weight="500"
        fill="url(#ink)">能</text>

  <circle cx="360" cy="358" r="8" fill="url(#gold)"/>
</svg>
